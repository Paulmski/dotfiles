# Prefix
unbind C-b
set-option -g prefix C-b
bind b send-prefix
# ── General ─────────────────────────────────────────────
set -g mouse on                    # Enable mouse (scrolling, resizing, clicking)
set -g base-index 1                # Windows start at 1, not 0
setw -g pane-base-index 1          # Panes start at 1 too
set -g renumber-windows on         # Renumber windows when one is closed
set -g history-limit 10000         # Scrollback buffer
set -sg escape-time 0              # No delay for escape (important for vim)
set -g focus-events on             # Forward focus events to vim
set -g default-terminal "tmux-256color"
set -ag terminal-overrides ",xterm-256color:RGB"

# ── Splits ──────────────────────────────────────────────
# Use | and - for splits (more intuitive)
bind | split-window -h -c "#{pane_current_path}"
bind - split-window -v -c "#{pane_current_path}"
unbind '"'
unbind %

# New windows open in current directory
bind c new-window -c "#{pane_current_path}"

# ── Navigation ──────────────────────────────────────────
# Vim-style pane switching
bind h select-pane -L
bind j select-pane -D
bind k select-pane -U
bind l select-pane -R

# Resize panes with Ctrl+hjkl
bind -r C-h resize-pane -L 5
bind -r C-j resize-pane -D 5
bind -r C-k resize-pane -U 5
bind -r C-l resize-pane -R 5

# ── Copy Mode (vi) ─────────────────────────────────────
setw -g mode-keys vi
bind -T copy-mode-vi v send -X begin-selection
bind -T copy-mode-vi y send -X copy-selection-and-cancel

# ── Status Bar ──────────────────────────────────────────
set -g status-position top
set -g status-style "bg=#1a1b26,fg=#a9b1d6"
set -g status-left "#[fg=#7aa2f7,bold] #S "
set -g status-right "#[fg=#565f89] %H:%M "
set -g status-left-length 30
setw -g window-status-format "#[fg=#565f89] #I:#W "
setw -g window-status-current-format "#[fg=#7aa2f7,bold] #I:#W "

# ── Reload config ──────────────────────────────────────
bind r source-file ~/.tmux.conf \; display "Config reloaded!"

# ── Plugins ─────────────────────────────────────────────
set -g @plugin 'tmux-plugins/tpm'
set -g @plugin 'wfxr/tmux-fzf-url'
run '~/.tmux/plugins/tpm/tpm'
